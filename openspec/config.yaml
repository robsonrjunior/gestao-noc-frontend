schema: spec-driven

context: |
  ## Domain

  NOC (Network Operations Center) services for telecommunications companies.
  The portal manages network monitoring, incident response, and service
  assurance for telecom infrastructure.

  ## Languages

  - **UI / user-facing text**: Brazilian Portuguese (pt-BR)
  - **Code (identifiers, comments, docs)**: English

  ## Stack

  - React 19, TypeScript ~6, Vite 8
  - shadcn/ui components (Radix Sera style), Lucide icons
  - Tailwind CSS 4 (via `@tailwindcss/vite`, no config file)
  - React Router DOM 7
  - Path alias: `@/*` → `./src/*`

  ## Mock API

  - `json-server` (v1, beta) serves `db.json` as a REST API
  - Run alongside the Vite dev server for local development

  ## TypeScript rules

  - `verbatimModuleSyntax: true` — type-only imports must use `import type`
  - `erasableSyntaxOnly: true` — no enums, namespaces, parameter properties
  - `noUnusedLocals: true`, `noUnusedParameters: true`

  ## Styling

  - Tailwind CSS 4 (import-based, no config file)
  - Dark mode via `.dark` class on `<html>`
  - Prettier: no semicolons, double quotes, tabWidth 2, trailing commas es5
  - Fonts: Inter Variable (sans), Roboto Variable (heading)

  ## Commands

  - `npm run dev` — Vite dev server
  - `npm run build` — `tsc -b && vite build`
  - `npm run lint` — ESLint
  - `npm run typecheck` — `tsc --noEmit`
